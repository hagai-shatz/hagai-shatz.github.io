<!DOCTYPE html>
<html lang="eu">
<head>
    <title>My Life In Weeks</title>
    <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
        }

        h3 {
            margin-left: 10px;
            margin-bottom: 10px;
        }

        fieldset {
            border: none;
        }

        .week {
            width: 10px;
            height: 10px;
            margin: 1px;
            border: solid 1px black;
            float: left;
            background-color: white;
        }

        .age {
            font-size: xx-small;
            margin-left: -13px;
            position: relative;
            z-index: -10;
        }

        #weeks {
            margin-left: 20px;
        }
    </style>
    <script type="application/javascript">
		$(function () {
			const dob = new Date(localStorage['weeks-dob'] || '1970-01-01');
			$('input[name=dob]')
				.val(dob.toISOString().substring(0, 10))
				.change(function () {
					localStorage['weeks-dob'] = $(this).val();
				});

			const ageInWeeks = Math.floor((Date.now() - dob.getTime()) / (1000 * 60 * 60 * 24 * 7));

			for (let i = 0; i < 52 * 90; i++) {
				var age = Math.floor(i / 52);
				var month = Math.floor((i - age * 52) * 7 * 12 / 365);
				var color = '#DDFF9D';
				if (age > 4) color = '#FFE47A';
				if (age > 19) color = '#97DFFF';
				if (age > 23) color = '#FFB8BF';
				if (age > 63) color = '#D9C7FF';
				if (age > 76) color = '';
				if (ageInWeeks === i) color = '#111111';

				$('<div class="week"/>')
					.attr('title', 'Age ' + age + ' years and ' + month + ' months')
					.css('background-color', color)
					.append($('<div class="age"/>').text(age.toFixed(0)))
					.appendTo('#weeks');
			}
		});
    </script>
</head>
<body>
    <h3>My life in weeks</h3>
    <fieldset>
        <label for="dob">Date of birth:</label>
        <input id="dob" name="dob" type="date"/>
    </fieldset>
    <div id="weeks"></div>
</body>
</html>
